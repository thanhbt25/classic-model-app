<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đơn Hàng - Classic Models</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Classic Models</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Dashboard</a>
                <a class="nav-link" href="customers.html">Khách Hàng</a>
                <a class="nav-link active" href="orders.html">Đơn Hàng</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Danh sách Đơn hàng gần đây</h2>

        <div class="row mb-3">
            <div class="col-md-6 col-lg-4">
                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control" placeholder="Tìm theo Mã đơn, Mã KH, Trạng thái...">
                    <button class="btn btn-primary" type="button" id="searchBtn">
                        <i class="fas fa-search"></i> Tìm kiếm
                    </button>
                </div>
            </div>
        </div>
        
        <div class="table-responsive bg-white shadow-sm p-3 rounded mt-3">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Mã Đơn</th>
                        <th>Ngày Đặt</th>
                        <th>Ngày Yêu Cầu</th>
                        <th>Ngày Giao</th>
                        <th>Trạng Thái</th>
                        <th>Mã KH</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <tr><td colspan="6" class="text-center">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/orders.js"></script>
</body>
</html>

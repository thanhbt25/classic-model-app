<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Classic Models</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/base/jquery-ui.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Classic Models</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="index.html">Dashboard</a>
                <a class="nav-link" href="customers.html">Khách Hàng</a>
                <a class="nav-link" href="orders.html">Đơn Hàng</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4">Báo cáo Doanh thu</h2>
        
        <div class="row">
            <div class="col-md-8">
                <div class="card card-body">
                    <h5 class="card-title text-center">Doanh thu theo tháng</h5>
                    <canvas id="salesChart" height="100"></canvas>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-body">
                    <h5 class="card-title text-center">Tỷ trọng Danh mục</h5>
                    <canvas id="categoryChart" height="200"></canvas>
                </div>
            </div>
        </div>

        <div class="card card-body mt-2">
            <h5 class="card-title">Phân tích đa chiều (Pivot Table)</h5>
            <p class="text-muted small">Hãy kéo thả các ô màu vàng để tự tạo báo cáo.</p>
            <div id="pivotTable" style="overflow-x: auto;">Đang tải dữ liệu...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khách Hàng - Classic Models</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Classic Models</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Dashboard</a>
                <a class="nav-link active" href="customers.html">Khách Hàng</a>
                <a class="nav-link" href="orders.html">Đơn Hàng</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Danh sách Khách hàng</h2>
        
        <div class="row mb-4 mt-3 align-items-center">
            <div class="col-md-5 mb-2 mb-md-0">
                <input type="text" id="searchInput" class="form-control" placeholder="Tìm tên, SĐT, thành phố, quốc gia...">
            </div>
            <div class="col-md-4">
                <button class="btn btn-outline-success" id="toggleChartBtn">
                    🌍 Xem Phân bổ Quốc gia
                </button>
            </div>
        </div>

        <div id="chartContainer" class="row mb-4" style="display: none;">
            <div class="col-md-8 offset-md-2"> <div class="card card-body shadow-sm">
                    <h5 class="card-title text-center">Tỷ trọng Khách hàng theo Quốc gia</h5>
                    <div style="position: relative; height: 300px;"> 
                        <canvas id="countryChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive bg-white shadow-sm p-3 rounded">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Mã KH</th>
                        <th>Tên Công Ty/Khách Hàng</th>
                        <th>Người Liên Hệ</th>
                        <th>Số Điện Thoại</th>
                        <th>Thành Phố</th>
                        <th>Quốc Gia</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody">
                    <tr><td colspan="6" class="text-center">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="js/customers.js"></script>
</body>
</html>
